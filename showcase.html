<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Skolportfölj — Göteborgs Stad · Fastighetsavdelningen (showcase)</title>
<link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet" />
<script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
<style>
  :root {
    --ink:#0f172a; --muted:#64748b; --line:#e2e8f0; --bg:#f8fafc; --panel:#fff;
    --komm:#2563eb; --fri:#ea7317;
    --g1:#16a34a; --g2:#65a30d; --g3:#ca8a04; --g4:#ea580c; --g5:#dc2626;
    --side-w:280px;
  }
  * { box-sizing:border-box; }
  html,body { margin:0; height:100%; font-family:-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif; color:var(--ink); background:var(--bg); }
  #app { display:grid; grid-template-columns:var(--side-w) 1fr; grid-template-rows:auto 1fr; height:100%; }

  /* Header */
  header { grid-column:1/3; display:flex; align-items:center; gap:16px; padding:10px 18px; background:#fff; border-bottom:1px solid var(--line); z-index:5; }
  header h1 { font-size:15px; margin:0; font-weight:650; letter-spacing:-.01em; }
  header .sub { font-size:12px; color:var(--muted); }
  .tabs { display:flex; gap:4px; margin-left:24px; background:var(--bg); padding:3px; border-radius:10px; }
  .tabs button { border:0; background:transparent; font-family:inherit; font-size:13px; font-weight:600; color:var(--muted); padding:7px 16px; border-radius:8px; cursor:pointer; }
  .tabs button.active { background:#fff; color:var(--ink); box-shadow:0 1px 3px rgba(0,0,0,.1); }
  .badge { margin-left:auto; font-size:11px; font-weight:600; color:#92400e; background:#fef3c7; border:1px solid #fde68a; padding:4px 9px; border-radius:999px; white-space:nowrap; }

  /* Sidebar filters */
  aside.filters { grid-row:2; background:#fff; border-right:1px solid var(--line); padding:16px; overflow-y:auto; }
  .filters h3 { font-size:11px; text-transform:uppercase; letter-spacing:.05em; color:var(--muted); margin:0 0 8px; }
  .filters .group { margin-bottom:20px; }
  .filters input[type=search] { width:100%; padding:9px 11px; font-size:13px; border:1px solid var(--line); border-radius:9px; outline:none; margin-bottom:18px; }
  .filters input[type=search]:focus { border-color:var(--komm); }
  .chips { display:flex; flex-wrap:wrap; gap:6px; }
  .chip { font-size:12px; padding:6px 10px; border:1px solid var(--line); border-radius:999px; cursor:pointer; background:#fff; color:var(--muted); user-select:none; }
  .chip.on { background:var(--ink); color:#fff; border-color:var(--ink); }
  .chip .sw { display:inline-block; width:8px; height:8px; border-radius:50%; margin-right:5px; vertical-align:middle; }
  .reset { font-size:12px; color:var(--komm); cursor:pointer; background:none; border:0; padding:0; font-family:inherit; }
  .count { font-size:12px; color:var(--muted); margin-top:4px; }

  /* Main content */
  main { grid-row:2; position:relative; overflow:hidden; }
  #map { position:absolute; inset:0; }

  /* Map thematic control + legend */
  .mapctl { position:absolute; top:14px; left:14px; z-index:3; background:#fff; border:1px solid var(--line); border-radius:10px; padding:10px 12px; box-shadow:0 2px 8px rgba(0,0,0,.08); font-size:12px; }
  .mapctl label { display:block; font-weight:600; color:var(--muted); margin-bottom:6px; text-transform:uppercase; letter-spacing:.04em; font-size:10px; }
  .mapctl select { font-family:inherit; font-size:13px; border:1px solid var(--line); border-radius:7px; padding:6px 8px; outline:none; }
  .legend { margin-top:10px; }
  .legend .row { display:flex; align-items:center; gap:7px; margin-top:5px; }
  .legend .dot { width:11px; height:11px; border-radius:50%; border:2px solid #fff; box-shadow:0 0 0 1px rgba(0,0,0,.12); }

  /* Table view */
  .tablewrap { position:absolute; inset:0; overflow:auto; background:#fff; padding:0; display:none; }
  table { border-collapse:collapse; width:100%; font-size:13px; }
  thead th { position:sticky; top:0; background:#f1f5f9; text-align:left; padding:10px 12px; font-weight:650; font-size:11px; text-transform:uppercase; letter-spacing:.03em; color:var(--muted); cursor:pointer; white-space:nowrap; border-bottom:1px solid var(--line); }
  thead th:hover { color:var(--ink); }
  thead th .ar { font-size:9px; opacity:.6; }
  tbody td { padding:10px 12px; border-bottom:1px solid #f1f5f9; white-space:nowrap; }
  tbody tr:hover { background:#f8fafc; cursor:pointer; }
  .pill { font-size:11px; font-weight:600; padding:3px 8px; border-radius:6px; color:#fff; }
  .num { text-align:right; font-variant-numeric:tabular-nums; }

  /* Dashboard view */
  .dash { position:absolute; inset:0; overflow:auto; padding:22px; display:none; }
  .kpis { display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); gap:12px; margin-bottom:22px; }
  .kpi { background:#fff; border:1px solid var(--line); border-radius:12px; padding:14px 16px; }
  .kpi .k { font-size:11px; text-transform:uppercase; letter-spacing:.04em; color:var(--muted); font-weight:600; }
  .kpi .v { font-size:26px; font-weight:700; margin-top:4px; letter-spacing:-.02em; }
  .kpi .v small { font-size:13px; font-weight:500; color:var(--muted); }
  .card { background:#fff; border:1px solid var(--line); border-radius:12px; padding:18px; margin-bottom:18px; }
  .card h2 { font-size:14px; margin:0 0 4px; }
  .card .hint { font-size:12px; color:var(--muted); margin:0 0 14px; }
  .banner { display:flex; align-items:center; gap:16px; flex-wrap:wrap; background:#f0f7ff; border:1px solid #dbeafe; border-radius:10px; padding:12px 14px; margin-bottom:14px; font-size:13px; }
  .banner b { font-size:15px; }
  .banner label { margin-left:auto; font-size:12px; color:var(--muted); display:flex; align-items:center; gap:8px; white-space:nowrap; }
  .banner input { width:78px; padding:6px 8px; font-size:13px; border:1px solid var(--line); border-radius:7px; font-family:inherit; }
  .gaptable { width:100%; border-collapse:collapse; font-size:13px; }
  .gaptable th { text-align:left; padding:8px 10px; font-size:11px; text-transform:uppercase; color:var(--muted); border-bottom:1px solid var(--line); }
  .gaptable td { padding:9px 10px; border-bottom:1px solid #f1f5f9; }
  .gap-pos { color:var(--g5); font-weight:650; } /* platsbrist */
  .gap-neg { color:var(--g1); font-weight:650; } /* överskott */
  .distbar { display:flex; height:26px; border-radius:7px; overflow:hidden; border:1px solid var(--line); }
  .distbar span { display:flex; align-items:center; justify-content:center; color:#fff; font-size:11px; font-weight:600; }

  /* Info panel */
  #panel { position:absolute; top:0; right:0; height:100%; width:340px; max-width:90%; background:#fff; border-left:1px solid var(--line); box-shadow:-8px 0 24px rgba(0,0,0,.08); transform:translateX(100%); transition:transform .22s ease; z-index:6; display:flex; flex-direction:column; }
  #panel.open { transform:translateX(0); }
  .p-head { padding:18px; border-bottom:1px solid var(--line); position:relative; }
  .p-tag { display:inline-block; font-size:11px; font-weight:700; letter-spacing:.03em; text-transform:uppercase; padding:3px 8px; border-radius:6px; margin-bottom:8px; }
  .p-head h2 { margin:0; font-size:19px; letter-spacing:-.01em; }
  .p-close { position:absolute; top:14px; right:14px; border:0; background:#f1f5f9; width:30px; height:30px; border-radius:8px; cursor:pointer; font-size:16px; color:var(--muted); }
  .p-body { padding:6px 18px 18px; overflow-y:auto; }
  .field { padding:11px 0; border-bottom:1px solid var(--line); display:flex; justify-content:space-between; gap:12px; }
  .field:last-child { border-bottom:0; }
  .field .k { font-size:12px; color:var(--muted); }
  .field .v { font-size:13px; font-weight:600; text-align:right; }
  .mockflag { font-size:9px; font-weight:700; text-transform:uppercase; background:#fef3c7; color:#92400e; padding:1px 5px; border-radius:4px; margin-left:6px; vertical-align:middle; }
</style>
</head>
<body>
<div id="app">
  <header>
    <div>
      <h1>Skolportfölj — Göteborg</h1>
      <div class="sub">Fastighetsavdelningen · planeringsverktyg</div>
    </div>
    <div class="tabs" id="tabs">
      <button data-v="map" class="active">Karta</button>
      <button data-v="table">Tabell</button>
      <button data-v="dash">Översikt</button>
    </div>
    <span class="badge">⚠︎ Showcase · exempeldata</span>
  </header>

  <aside class="filters">
    <input id="search" type="search" placeholder="Sök skola…" autocomplete="off" />

    <div class="group">
      <h3>Stadsområde</h3>
      <div class="chips" data-facet="stadsomrade"></div>
    </div>
    <div class="group">
      <h3>Huvudman</h3>
      <div class="chips" data-facet="huvudman"></div>
    </div>
    <div class="group">
      <h3>Byggnadsår</h3>
      <div class="chips" data-facet="aldersgrupp"></div>
    </div>
    <div class="group">
      <h3>Renoveringsbehov</h3>
      <div class="chips" data-facet="renovgrupp"></div>
    </div>
    <div class="group">
      <h3>Beläggning</h3>
      <div class="chips" data-facet="belaggrupp"></div>
    </div>

    <div class="count" id="count"></div>
    <button class="reset" id="reset">Återställ filter</button>
  </aside>

  <main>
    <div id="map"></div>

    <div class="mapctl">
      <label>Färglägg efter</label>
      <select id="theme">
        <option value="renovbehov">Renoveringsbehov</option>
        <option value="belagg">Beläggningsgrad</option>
        <option value="byggnadsar">Byggnadsår</option>
        <option value="huvudman">Huvudman</option>
      </select>
      <div class="legend" id="legend"></div>
    </div>

    <div class="tablewrap" id="tablewrap"><table id="table"></table></div>
    <div class="dash" id="dash"></div>
  </main>

  <aside id="panel">
    <div class="p-head">
      <button class="p-close" onclick="closePanel()">×</button>
      <span class="p-tag" id="p-tag"></span>
      <h2 id="p-name"></h2>
    </div>
    <div class="p-body" id="p-body"></div>
  </aside>
</div>

<script>
/* ===========================================================================
   EXEMPELDATA — verkliga Göteborgsskolor (namn/huvudman). Byggnadsår,
   renoveringsbehov, BTA, platser, underhållsskuld m.m. är PLACEHOLDER och
   måste kopplas mot fastighetsavdelningens underhålls-/FM-system samt
   elevprognoser innan skarp användning. Koordinater är ungefärliga.
   Fält: namn, huvudman, stadsomrade, arskurser, adress, lng, lat,
         byggnadsar, senasteRenov, bta, platser, elever, renovbehov(1-5),
         underhallsskuld(Mkr), energiklass, fastighet
=========================================================================== */
const RAW = [
  ["Annedalsskolan","Kommunal","Centrum","F–6","Skansberget 1",11.9533,57.6886,1908,1998,4200,360,332,4,38,"E","ANNEDAL 12:3"],
  ["Nordhemsskolan","Kommunal","Centrum","F–9","Stigbergsliden 7",11.9510,57.6975,1886,2005,6800,560,548,5,72,"F","MASTHUGG 8:1"],
  ["Johannebergsskolan","Kommunal","Centrum","F–9","V. Rydbergsg. 11",11.9865,57.6855,1924,2012,5400,500,470,3,21,"D","JOHANNEBERG 4:2"],
  ["Guldhedsskolan","Kommunal","Centrum","F–6","Doktor Bex gata 5",11.9720,57.6840,1955,1990,3900,300,288,4,29,"E","GULDHEDEN 1:9"],
  ["Kärralundsskolan","Kommunal","Centrum","F–9","Solhemsgatan 1",12.0150,57.7010,1969,2018,7100,600,612,3,18,"C","BÖ 32:5"],
  ["Lundenskolan","Kommunal","Centrum","F–9","Örnehufvudsg. 1",12.0080,57.7090,1948,2001,5900,480,455,4,34,"E","LUNDEN 14:1"],
  ["Göteborgs Högre Samskola","Fristående","Centrum","F–9","Recogatan 14",11.9760,57.6960,1901,2010,6400,520,510,2,0,"D","VASASTADEN 5:7"],
  ["Montessoriskolan Elyseum","Fristående","Centrum","F–9","Stampgatan 26",11.9600,57.7000,1962,2015,2800,240,212,2,0,"C","GÅRDA 18:3"],
  ["IES Göteborg","Fristående","Centrum","4–9","Mölndalsvägen 93",11.9920,57.6800,1972,2016,7800,760,742,2,0,"C","KROKSLÄTT 109:2"],

  ["Bergsjöskolan","Kommunal","Nordost","F–9","Rymdtorget 5",12.0480,57.7280,1968,1994,8300,560,498,5,86,"F","BERGSJÖN 25:1"],
  ["Sandeklevsskolan","Kommunal","Nordost","F–9","Sandeklevsg. 80",12.0420,57.7450,1965,1989,6200,520,540,5,68,"F","KORTEDALA 41:8"],
  ["Gärdsåsskolan","Kommunal","Nordost","F–6","Tellbacken 6",12.0360,57.7400,1961,1996,4100,320,346,4,41,"E","KORTEDALA 28:2"],
  ["Rannebergsskolan","Kommunal","Nordost","F–9","Ranneberg C",12.0500,57.8100,1972,1998,5600,440,468,4,52,"E","RANNEBERGEN 7:1"],
  ["Lövgärdesskolan","Kommunal","Nordost","F–9","Lövgärdets C",12.0250,57.8200,1970,1991,6100,480,512,5,77,"F","GÅRDSTEN 33:4"],

  ["Toleredsskolan","Kommunal","Hisingen","F–6","Toleredsgatan 8",11.9180,57.7390,1957,2003,4600,360,300,3,24,"D","TOLERED 73:2"],
  ["Brunnsboskolan","Kommunal","Hisingen","F–9","Tuvevägen 35",11.9300,57.7480,1966,2009,6700,540,520,3,27,"D","BRUNNSBO 1:5"],
  ["Ryaskolan","Kommunal","Hisingen","F–6","Ryavägen 4",11.8900,57.6950,2014,2014,5200,420,398,1,4,"A","RYA 4:7"],
  ["Taubeskolan","Kommunal","Hisingen","F–9","Vårväderstorget 1",11.9100,57.7100,1959,1993,5800,460,476,4,49,"E","BISKOPSGÅRDEN 830:9"],

  ["Frölundaskolan","Kommunal","Sydväst","7–9","Nymilsgatan 2",11.9120,57.6510,1963,1997,9200,650,602,4,58,"E","JÄRNBROTT 164:1"],
  ["Önneredsskolan","Kommunal","Sydväst","F–6","Önneredsv. 30",11.8850,57.6350,1971,2008,4400,340,366,3,22,"D","ÖNNERED 60:3"],
  ["Påvelundsskolan","Kommunal","Sydväst","F–9","Vidkärrsg. 5",11.8750,57.6650,1958,2002,5500,440,418,4,36,"E","ÄLVSBORG 178:1"],
  ["Askimsskolan","Kommunal","Sydväst","F–9","Skintebov. 12",11.9000,57.6100,2019,2019,6300,520,488,1,2,"A","ASKIM 24:5"],
];

/* Elevprognos 2030 per stadsområde (mock, områdesnivå = så här ser
   verklig demografiprognos ut — aldrig per skola) */
const FORECAST_2030 = { Centrum:3950, Nordost:2780, Hisingen:2050, Sydväst:2120 };

const COLORS = { Centrum:"#2563eb", Nordost:"#dc2626", Hisingen:"#ca8a04", Sydväst:"#16a34a" };
const RENOV = { 1:["Nyskick","#16a34a"], 2:["Gott","#65a30d"], 3:["Acceptabelt","#ca8a04"], 4:["Eftersatt","#ea580c"], 5:["Akut","#dc2626"] };

const ALL = RAW.map((r,i)=>{
  const belagg = r[11]/r[10];
  let aldersgrupp = r[7]<1960?"–1959":r[7]<1980?"1960–79":r[7]<2010?"1980–2009":"2010–";
  let renovgrupp = r[12]<=2?"OK":r[12]==3?"Acceptabelt":r[12]==4?"Eftersatt":"Akut";
  let belaggrupp = belagg<0.85?"Underbelagd":belagg<=1.0?"Balanserad":"Överbelagd";
  return { id:i, namn:r[0], huvudman:r[1], stadsomrade:r[2], arskurser:r[3], adress:r[4],
    lng:r[5], lat:r[6], byggnadsar:r[7], senasteRenov:r[8], bta:r[9], platser:r[10],
    elever:r[11], renovbehov:r[12], underhallsskuld:r[13], energiklass:r[14], fastighet:r[15],
    belagg:+belagg.toFixed(3), belaggPct:Math.round(belagg*100),
    aldersgrupp, renovgrupp, belaggrupp };
});

/* ---- filter state ---- */
const FACETS = {
  stadsomrade:["Centrum","Nordost","Hisingen","Sydväst"],
  huvudman:["Kommunal","Fristående"],
  aldersgrupp:["–1959","1960–79","1980–2009","2010–"],
  renovgrupp:["OK","Acceptabelt","Eftersatt","Akut"],
  belaggrupp:["Underbelagd","Balanserad","Överbelagd"],
};
const sel = { stadsomrade:new Set(), huvudman:new Set(), aldersgrupp:new Set(), renovgrupp:new Set(), belaggrupp:new Set() };
let searchTerm = "", view = "map", sortKey = "namn", sortDir = 1;
let refSize = 480; // antagen storlek på en ny skola (platser) — justerbar i Översikt

function filtered() {
  return ALL.filter(s=>{
    for (const f in sel) if (sel[f].size && !sel[f].has(s[f])) return false;
    if (searchTerm && !s.namn.toLowerCase().includes(searchTerm) && !s.adress.toLowerCase().includes(searchTerm)) return false;
    return true;
  });
}

/* ---- build filter chips ---- */
document.querySelectorAll(".chips").forEach(box=>{
  const facet = box.dataset.facet;
  FACETS[facet].forEach(val=>{
    const c = document.createElement("div");
    c.className = "chip"; c.dataset.val = val;
    let sw = "";
    if (facet==="stadsomrade") sw = `<span class="sw" style="background:${COLORS[val]}"></span>`;
    c.innerHTML = sw + val;
    c.onclick = ()=>{ sel[facet].has(val)?sel[facet].delete(val):sel[facet].add(val); c.classList.toggle("on"); render(); };
    box.appendChild(c);
  });
});
document.getElementById("search").addEventListener("input", e=>{ searchTerm=e.target.value.trim().toLowerCase(); render(); });
document.getElementById("reset").onclick = ()=>{
  for (const f in sel) sel[f].clear();
  searchTerm=""; document.getElementById("search").value="";
  document.querySelectorAll(".chip.on").forEach(c=>c.classList.remove("on"));
  render();
};

/* ---- tabs ---- */
document.getElementById("tabs").onclick = e=>{
  if (e.target.tagName!=="BUTTON") return;
  view = e.target.dataset.v;
  [...e.currentTarget.children].forEach(b=>b.classList.toggle("active", b===e.target));
  document.getElementById("map").style.display = view==="map"?"block":"none";
  document.querySelector(".mapctl").style.display = view==="map"?"block":"none";
  document.getElementById("tablewrap").style.display = view==="table"?"block":"none";
  document.getElementById("dash").style.display = view==="dash"?"block":"none";
  if (view==="map") map.resize();
  render();
};

/* =================== MAP =================== */
const map = new maplibregl.Map({ container:"map", style:"https://tiles.openfreemap.org/styles/liberty", center:[11.97,57.71], zoom:10.6 });
map.addControl(new maplibregl.NavigationControl({ showCompass:false }), "bottom-right");

const themeExpr = {
  renovbehov: ["match",["get","renovbehov"],1,RENOV[1][1],2,RENOV[2][1],3,RENOV[3][1],4,RENOV[4][1],5,RENOV[5][1],"#999"],
  belagg: ["case",["<",["get","belagg"],0.85],"#2563eb",["<=",["get","belagg"],1.0],"#16a34a","#dc2626"],
  byggnadsar: ["interpolate",["linear"],["get","byggnadsar"],1900,"#dc2626",1975,"#ca8a04",2010,"#16a34a",2020,"#15803d"],
  huvudman: ["match",["get","huvudman"],"Kommunal","#2563eb","Fristående","#ea7317","#999"],
};
const LEGENDS = {
  renovbehov: [["Akut",RENOV[5][1]],["Eftersatt",RENOV[4][1]],["Acceptabelt",RENOV[3][1]],["Gott",RENOV[2][1]],["Nyskick",RENOV[1][1]]],
  belagg: [["Överbelagd >100%","#dc2626"],["Balanserad 85–100%","#16a34a"],["Underbelagd <85%","#2563eb"]],
  byggnadsar: [["Före 1960","#dc2626"],["1960–1990","#ca8a04"],["Efter 2010","#16a34a"]],
  huvudman: [["Kommunal","#2563eb"],["Fristående","#ea7317"]],
};
let theme = "renovbehov";
function geojson(list){ return { type:"FeatureCollection", features:list.map(s=>({ type:"Feature", id:s.id, geometry:{type:"Point",coordinates:[s.lng,s.lat]}, properties:s })) }; }

map.on("load", ()=>{
  map.addSource("schools", { type:"geojson", data:geojson(ALL) });
  map.addLayer({ id:"pt", type:"circle", source:"schools",
    paint:{ "circle-color":themeExpr[theme], "circle-radius":["interpolate",["linear"],["zoom"],10,6,14,11], "circle-stroke-width":2.5, "circle-stroke-color":"#fff" } });
  map.on("click","pt", e=>openPanel(e.features[0].properties));
  map.on("mouseenter","pt", ()=>map.getCanvas().style.cursor="pointer");
  map.on("mouseleave","pt", ()=>map.getCanvas().style.cursor="");
  render();
});
document.getElementById("theme").onchange = e=>{
  theme = e.target.value;
  if (map.getLayer("pt")) map.setPaintProperty("pt","circle-color",themeExpr[theme]);
  drawLegend();
};
function drawLegend(){
  document.getElementById("legend").innerHTML = LEGENDS[theme].map(([lab,col])=>`<div class="row"><span class="dot" style="background:${col}"></span>${lab}</div>`).join("");
}

/* =================== TABLE =================== */
const COLS = [
  ["namn","Skola",0],["stadsomrade","Område",0],["byggnadsar","Byggår",1],
  ["renovbehov","Renov.behov",1],["platser","Platser",1],["elever","Elever",1],
  ["belaggPct","Beläggn.",1],["underhallsskuld","Underh.skuld",1],
];
function renderTable(list){
  const sorted = [...list].sort((a,b)=>{ const x=a[sortKey],y=b[sortKey]; return (x>y?1:x<y?-1:0)*sortDir; });
  let h = "<thead><tr>"+COLS.map(([k,lab])=>`<th data-k="${k}">${lab} <span class="ar">${sortKey===k?(sortDir>0?"▲":"▼"):""}</span></th>`).join("")+"</tr></thead><tbody>";
  h += sorted.map(s=>`<tr data-id="${s.id}">
    <td>${s.namn}</td>
    <td>${s.stadsomrade}</td>
    <td class="num">${s.byggnadsar}</td>
    <td><span class="pill" style="background:${RENOV[s.renovbehov][1]}">${RENOV[s.renovbehov][0]}</span></td>
    <td class="num">${s.platser}</td>
    <td class="num">${s.elever}</td>
    <td class="num" style="color:${s.belaggPct>100?'#dc2626':s.belaggPct<85?'#2563eb':'#16a34a'}">${s.belaggPct}%</td>
    <td class="num">${s.underhallsskuld?s.underhallsskuld+" Mkr":"–"}</td>
  </tr>`).join("");
  h += "</tbody>";
  const t = document.getElementById("table"); t.innerHTML = h;
  t.querySelectorAll("th").forEach(th=>th.onclick=()=>{ const k=th.dataset.k; if(sortKey===k)sortDir*=-1;else{sortKey=k;sortDir=1;} renderTable(filtered()); });
  t.querySelectorAll("tbody tr").forEach(tr=>tr.onclick=()=>openPanel(ALL[+tr.dataset.id]));
}

/* =================== DASHBOARD =================== */
function renderDash(list){
  const sum = (a,k)=>a.reduce((t,s)=>t+s[k],0);
  const platser=sum(list,"platser"), elever=sum(list,"elever");
  const skuld=sum(list,"underhallsskuld");
  const akut=list.filter(s=>s.renovbehov>=4).length;
  const bel = platser?Math.round(elever/platser*100):0;

  const kpis = [
    ["Skolor", list.length],
    ["Totala platser", platser.toLocaleString("sv")],
    ["Elever idag", elever.toLocaleString("sv")],
    ["Beläggning", bel+"%"],
    ["Underhållsskuld", skuld+" <small>Mkr</small>"],
    ["Eftersatt/akut", akut+" <small>skolor</small>"],
  ];

  // capacity vs demand by area
  const areas = ["Centrum","Nordost","Hisingen","Sydväst"];
  const rows = areas.map(a=>{
    const g = list.filter(s=>s.stadsomrade===a);
    const p=sum(g,"platser"), e=sum(g,"elever"), f=FORECAST_2030[a];
    const gap = f-p; // positiv = platsbrist
    const units = Math.round(gap/refSize); // +N = bygg, -N = avveckla/omdisponera
    return {a,n:g.length,p,e,f,gap,units,bel:p?Math.round(e/p*100):0};
  });
  const totGap = rows.reduce((t,r)=>t+r.gap,0);
  const totNew = rows.filter(r=>r.units>0).reduce((t,r)=>t+r.units,0);

  // åtgärdsförslag per område
  const action = r=>{
    if (r.units>=1) return `<span class="gap-pos">Bygg ~${r.units} ny skola${r.units>1?"r":""}</span>`;
    if (r.units<=-1) return `<span class="gap-neg">Översyn: ~${-r.units} skola${r.units< -1?"r":""} kan avvecklas</span>`;
    return `<span style="color:var(--muted)">Balanserad</span>`;
  };

  // renovation distribution
  const dist = [1,2,3,4,5].map(lvl=>({lvl,n:list.filter(s=>s.renovbehov===lvl).length}));
  const distTot = list.length||1;

  document.getElementById("dash").innerHTML = `
    <div class="kpis">${kpis.map(([k,v])=>`<div class="kpi"><div class="k">${k}</div><div class="v">${v}</div></div>`).join("")}</div>

    <div class="card">
      <h2>Kapacitet vs. behov per stadsområde — 2030</h2>
      <p class="hint">Platser (utbud) jämfört med elevprognos 2030 (efterfrågan). Positivt gap = <b>platsbrist</b> som kräver ny-/tillbyggnad. <span class="mockflag">exempelprognos</span></p>
      <div class="banner">
        <div><b>${totGap>0?"+"+totGap.toLocaleString("sv"):totGap.toLocaleString("sv")}</b> platser ${totGap>0?"saknas":"i överskott"} totalt 2030 — motsvarar <b>~${totNew}</b> nya skolor att planera för.</div>
        <label>Platser per ny skola <input id="refsize" type="number" min="100" max="1200" step="20" value="${refSize}"></label>
      </div>
      <table class="gaptable">
        <thead><tr><th>Område</th><th>Skolor</th><th>Platser</th><th>Elever idag</th><th>Beläggn.</th><th>Prognos 2030</th><th>Gap 2030</th><th>Åtgärd 2030</th></tr></thead>
        <tbody>${rows.map(r=>`<tr>
          <td><b>${r.a}</b></td><td>${r.n}</td><td>${r.p.toLocaleString("sv")}</td><td>${r.e.toLocaleString("sv")}</td>
          <td>${r.bel}%</td><td>${r.f.toLocaleString("sv")}</td>
          <td class="${r.gap>0?'gap-pos':'gap-neg'}">${r.gap>0?"+"+r.gap+" platsbrist":r.gap+" överskott"}</td>
          <td>${action(r)}</td>
        </tr>`).join("")}</tbody>
      </table>
    </div>

    <div class="card">
      <h2>Renoveringsbehov i portföljen</h2>
      <p class="hint">Fördelning av filtrerade skolor efter skick.</p>
      <div class="distbar">${dist.filter(d=>d.n).map(d=>`<span style="background:${RENOV[d.lvl][1]};width:${d.n/distTot*100}%" title="${RENOV[d.lvl][0]}">${d.n}</span>`).join("")}</div>
    </div>`;

  const ri = document.getElementById("refsize");
  if (ri) ri.onchange = e=>{ refSize = Math.max(100, +e.target.value||480); renderDash(filtered()); };
}

/* =================== PANEL =================== */
function openPanel(p){
  document.getElementById("p-name").textContent = p.namn;
  const tag = document.getElementById("p-tag");
  tag.textContent = p.huvudman;
  tag.style.background = p.huvudman==="Kommunal"?"#dbeafe":"#ffedd5";
  tag.style.color = p.huvudman==="Kommunal"?"#1e40af":"#9a3412";
  const m = '<span class="mockflag">exempel</span>';
  const f = (k,v,mock)=>`<div class="field"><div class="k">${k}</div><div class="v">${v}${mock?m:""}</div></div>`;
  document.getElementById("p-body").innerHTML =
    f("Stadsområde", p.stadsomrade) +
    f("Adress", p.adress) +
    f("Årskurser", p.arskurser) +
    f("Fastighetsbeteckning", "GÖTEBORG "+p.fastighet, true) +
    f("Byggnadsår", p.byggnadsar, true) +
    f("Senaste renovering", p.senasteRenov, true) +
    f("BTA", p.bta.toLocaleString("sv")+" m²", true) +
    f("Platser / elever", p.platser+" / "+p.elever) +
    f("Beläggningsgrad", `<span style="color:${p.belaggPct>100?'#dc2626':p.belaggPct<85?'#2563eb':'#16a34a'}">${p.belaggPct}%</span>`) +
    f("Renoveringsbehov", `<span class="pill" style="background:${RENOV[p.renovbehov][1]}">${RENOV[p.renovbehov][0]}</span>`, true) +
    f("Underhållsskuld", p.underhallsskuld?p.underhallsskuld+" Mkr":"–", true) +
    f("Energiklass", p.energiklass, true);
  document.getElementById("panel").classList.add("open");
}
function closePanel(){ document.getElementById("panel").classList.remove("open"); }

/* =================== RENDER =================== */
function render(){
  const list = filtered();
  document.getElementById("count").textContent = `${list.length} av ${ALL.length} skolor`;
  if (view==="map" && map.getSource("schools")) map.getSource("schools").setData(geojson(list));
  if (view==="table") renderTable(list);
  if (view==="dash") renderDash(list);
  drawLegend();
}
drawLegend();
</script>
